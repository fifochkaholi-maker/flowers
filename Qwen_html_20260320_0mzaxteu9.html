<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>disconnect</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=VT323&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #fff;
            font-family: 'Courier Prime', monospace;
            overflow: hidden;
        }

        /* --- ЭТАП 1: Лобби --- */
        #stage-1 {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chaos-text {
            position: absolute;
            font-family: 'VT323', monospace;
            font-size: 2rem;
            opacity: 0.8;
            pointer-events: none;
            animation: 
                textGlitch1 0.5s infinite, 
                floatChaos 3s infinite ease-in-out;
            transform-origin: center;
        }

        @keyframes textGlitch1 {
            0% { text-shadow: 2px 0 blue, -2px 0 green; opacity: 0.8; }
            25% { text-shadow: -2px 0 blue, 2px 0 green; opacity: 0.5; }
            50% { text-shadow: 2px 0 black, -2px 0 blue; opacity: 0.9; }
            75% { text-shadow: -2px 0 black, 2px 0 green; opacity: 0.6; }
            100% { text-shadow: 2px 0 blue, -2px 0 green; opacity: 0.8; }
        }

        @keyframes floatChaos {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            20% { transform: translate(-10px, 10px) rotate(-5deg) scale(1.1); }
            40% { transform: translate(10px, -10px) rotate(5deg) scale(0.9); }
            60% { transform: translate(-5px, -15px) rotate(-2deg) scale(1.05); }
            80% { transform: translate(15px, 5px) rotate(3deg) scale(0.95); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        #disconnect-btn {
            position: absolute;
            padding: 15px 30px;
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            font-family: 'Courier Prime', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 100;
            transition: all 0.8s ease;
        }

        /* --- ЭТАП 2: Печатная машинка --- */
        #stage-2 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        #typewriter-text {
            font-size: 3rem;
            color: #ccc;
            border-right: 2px solid #ccc;
            white-space: nowrap;
            overflow: hidden;
            animation: blinkCursor 0.7s steps(40) infinite normal;
        }

        @keyframes blinkCursor {
            from { border-right-color: #ccc; }
            to { border-right-color: transparent; }
        }

        /* --- ЭТАП 3: Слайдшоу и Музыка --- */
        #stage-3 {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 300;
            background: #000;
        }

        #telegram-link-container {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            cursor: crosshair;
            position: relative;
        }

        #slideshow-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            display: block;
            animation: imageGlitch 0.3s infinite;
        }

        #slideshow-img.active {
            opacity: 1;
        }

        @keyframes imageGlitch {
            0% { 
                opacity: 1;
                transform: translate(0, 0) scale(1);
                filter: none;
                clip-path: inset(0 0 0 0);
            }
            10% { 
                opacity: 0.8;
                transform: translate(-5px, 3px) scale(1.02);
                filter: hue-rotate(90deg) contrast(1.5);
                clip-path: inset(10% 0 80% 0);
            }
            20% { 
                opacity: 0.6;
                transform: translate(5px, -3px) scale(0.98);
                filter: invert(1) blur(1px);
                clip-path: inset(80% 0 10% 0);
            }
            30% { 
                opacity: 0.9;
                transform: translate(3px, 5px) skewX(-5deg);
                filter: hue-rotate(180deg);
                clip-path: inset(0 0 0 0);
            }
            40% { 
                opacity: 0.7;
                transform: translate(-3px, -5px) scale(1.05);
                filter: contrast(2) saturate(3);
                clip-path: inset(50% 0 50% 0);
            }
            50% { 
                opacity: 1;
                transform: translate(0, 0) scale(1);
                filter: none;
                clip-path: inset(0 0 0 0);
            }
            60% { 
                opacity: 0.5;
                transform: translate(8px, -8px) rotate(2deg);
                filter: invert(0.5) blur(2px);
                clip-path: inset(30% 0 60% 0);
            }
            70% { 
                opacity: 0.8;
                transform: translate(-8px, 8px) skewX(5deg);
                filter: hue-rotate(270deg) contrast(1.8);
                clip-path: inset(60% 0 30% 0);
            }
            80% { 
                opacity: 0.6;
                transform: translate(5px, 5px) scale(0.95);
                filter: invert(1);
                clip-path: inset(0 0 0 0);
            }
            90% { 
                opacity: 0.9;
                transform: translate(-5px, -5px) skewX(-3deg);
                filter: contrast(1.5) saturate(2);
                clip-path: inset(40% 0 40% 0);
            }
            100% { 
                opacity: 1;
                transform: translate(0, 0) scale(1);
                filter: none;
                clip-path: inset(0 0 0 0);
            }
        }

        #lyrics-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); 
            font-family: 'VT323', monospace;
            font-size: 6rem;
            text-align: center;
            z-index: 301;
            pointer-events: none;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            animation: textGlitch2 0.1s infinite; 
        }

        @keyframes textGlitch2 {
            0% { 
                text-shadow: 4px 0 red, -4px 0 purple; 
                color: white; 
                transform: translate(-50%, -50%) skewX(0deg) scale(1);
                opacity: 1;
                filter: none;
            }
            10% { 
                text-shadow: -4px 0 black, 4px 0 white; 
                color: red; 
                transform: translate(-48%, -52%) skewX(-10deg) scale(1.2);
                filter: blur(2px);
            }
            20% { 
                text-shadow: 4px 0 purple, -4px 0 black; 
                color: white; 
                transform: translate(-52%, -48%) skewX(10deg) scale(0.9);
                filter: invert(1);
            }
            30% { 
                text-shadow: -4px 0 red, 4px 0 purple; 
                color: black; 
                transform: translate(-50%, -50%) skewX(0deg) scale(1.5);
                opacity: 0.5;
            }
            40% { 
                text-shadow: 4px 0 white, -4px 0 red; 
                color: purple; 
                transform: translate(-50%, -50%) rotate(5deg) scale(1.1);
                filter: blur(0px);
            }
            50% { 
                text-shadow: -4px 0 black, 4px 0 white; 
                color: red; 
                transform: translate(-50%, -50%) rotate(-5deg) scale(0.8);
                opacity: 1;
            }
            60% { 
                text-shadow: 4px 0 blue, -4px 0 green; 
                color: white; 
                transform: translate(-50%, -50%) skewX(20deg);
                filter: invert(0);
            }
            70% { 
                text-shadow: -4px 0 red, 4px 0 purple; 
                color: black; 
                transform: translate(-55%, -45%) scale(1.3);
                opacity: 0.8;
            }
            80% { 
                text-shadow: 4px 0 white, -4px 0 red; 
                color: purple; 
                transform: translate(-45%, -55%) scale(0.7);
            }
            90% { 
                text-shadow: -4px 0 black, 4px 0 white; 
                color: red; 
                transform: translate(-50%, -50%) skewX(-15deg) scale(1.1);
                filter: blur(1px);
            }
            100% { 
                text-shadow: 4px 0 red, -4px 0 purple; 
                color: white; 
                transform: translate(-50%, -50%) skewX(0deg) scale(1);
                opacity: 1;
            }
        }

    </style>
</head>
<body>

    <!-- Аудио -->
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- ЭТАП 1 -->
    <div id="stage-1">
        <div id="disconnect-btn">отключиться</div>
    </div>

    <!-- ЭТАП 2 -->
    <div id="stage-2">
        <div id="typewriter-text"></div>
    </div>

    <!-- ЭТАП 3 -->
    <div id="stage-3">
        <a href="https://t.me/whynuk" id="telegram-link-container">
            <img id="slideshow-img" src="" alt="">
        </a>
        <div id="lyrics-overlay">fleece</div>
    </div>

    <script>
        // ============================================
        // ⚙️ НАСТРОЙКИ - МЕНЯТЬ ЗДЕСЬ СВОИ ДАННЫЕ ⚙️
        // ============================================
        
        // Ссылка на твой телеграм канал
        const TELEGRAM_URL = "https://t.me/whynuk";
        
        // Твои фотографии (6 штук)
        // Вариант 1: Если фото в папке images (рекомендуется)
        const IMAGES = [
            "images/photo1.jpg",
            "images/photo2.jpg",
            "images/photo3.jpg",
            "images/photo4.jpg",
            "images/photo5.jpg",
            "images/photo6.jpg"
        ];
        
        // Вариант 2: Если хочешь использовать ссылки из интернета
        // Просто замени пути выше на URL, например:
        // "https://example.com/my-photo.jpg"
        
        // Надписи из песни (можно менять)
        const LYRICS = ["fleece", "run away", "don't look back", "it's inside", "dreaming"];
        
        // ============================================

        const PHRASES = [
            "кто внутри?", "зачем он здесь?", "кто нас создал?", 
            "избранные прокляты", "создатель мерт", "последний дни в церкви"
        ];

        // --- ЛОГИКА ---
        const btn = document.getElementById('disconnect-btn');
        const stage1 = document.getElementById('stage-1');
        const stage2 = document.getElementById('stage-2');
        const stage3 = document.getElementById('stage-3');
        const typewriterText = document.getElementById('typewriter-text');
        const music = document.getElementById('bg-music');
        const imgElement = document.getElementById('slideshow-img');
        const lyricsElement = document.getElementById('lyrics-overlay');
        const telegramLink = document.getElementById('telegram-link-container');

        // Установка ссылки на телеграм
        telegramLink.href = TELEGRAM_URL;

        // 1. Генерация фраз на фоне
        PHRASES.forEach(text => {
            const el = document.createElement('div');
            el.classList.add('chaos-text');
            el.innerText = text;
            el.style.top = Math.random() * 80 + 10 + '%';
            el.style.left = Math.random() * 80 + 10 + '%';
            el.style.fontSize = (Math.random() * 2 + 1) + 'rem';
            el.style.animationDelay = Math.random() * 2 + 's';
            stage1.appendChild(el);
        });

        // 2. Хаотичное движение кнопки (замедленное)
        function moveButton() {
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            setTimeout(moveButton, Math.random() * 1200 + 800);
        }
        moveButton();

        // 3. Обработка клика по кнопке
        btn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            stage1.style.transition = 'opacity 2s';
            stage1.style.opacity = '0';
            setTimeout(() => {
                stage1.style.display = 'none';
                startTyping();
            }, 2000);
        });

        // 4. Эффект печатной машинки
        function startTyping() {
            stage2.style.display = 'flex';
            const text = "погрешимы";
            let i = 0;
            const typeInterval = setInterval(() => {
                typewriterText.innerText += text.charAt(i);
                i++;
                if (i >= text.length) {
                    clearInterval(typeInterval);
                    setTimeout(startStage3, 1500); 
                }
            }, 150); 
        }

        // 5. Запуск финальной сцены с глитчем на фото
        function startStage3() {
            stage2.style.display = 'none';
            stage3.style.display = 'block';
            
            music.volume = 0.5;
            music.play().catch(e => console.log("Audio play failed: ", e));

            let imgIndex = 0;
            
            function changeImage() {
                imgElement.classList.remove('active');
                
                setTimeout(() => {
                    imgElement.src = IMAGES[imgIndex];
                    imgElement.classList.add('active');
                    
                    lyricsElement.innerText = LYRICS[Math.floor(Math.random() * LYRICS.length)];
                    
                    imgIndex = (imgIndex + 1) % IMAGES.length;
                }, 300); 
            }

            changeImage(); 
            setInterval(changeImage, 1500); 
        }

    </script>
</body>
</html>
